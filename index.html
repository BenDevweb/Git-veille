<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Versioning Manuel vs Git</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f4f8;
            color: #334155;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
            text-align: center;
        }
        .card {
            background-color: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            transition: transform 0.3s ease;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        h1 {
            color: #1a202c;
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.125rem;
            line-height: 1.75;
            margin-bottom: 1.5rem;
        }
        .btn-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }
        .btn {
            background-color: #3b82f6;
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }
        .btn:hover {
            background-color: #2563eb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Git : Le versioning distribué</h1>.
        <p>Découvrez comment **Git**, le système de versioning distribué, rend la collaboration et le suivi des modifications de code simple et efficace.</p>
        <div class="btn-container">
            <a href="#" class="btn" onclick="alert('Cette fonctionnalité sera disponible dans une prochaine version !');">En savoir plus</a>
            <a href="#" class="btn" onclick="alert('Cette fonctionnalité sera disponible dans une prochaine version !');">Télécharger le rapport</a>
        </div>
    </div>
</body>
</html>
